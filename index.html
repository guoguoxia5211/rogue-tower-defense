<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>肉鸽塔防 v0.1.0</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        
        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            touch-action: none;
        }
        
        #gameContainer {
            position: relative;
            width: 100%;
            max-width: 800px;
        }
        
        #gameCanvas {
            width: 100%;
            height: auto;
            display: block;
            background: linear-gradient(180deg, #87CEEB 0%, #98FB98 100%);
        }
        
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
        }
        
        .ui-panel {
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .ui-icon {
            font-size: 20px;
        }
        
        #startScreen, #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 100;
        }
        
        #gameOverScreen {
            display: none;
        }
        
        h1 {
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.5);
            background: linear-gradient(45deg, #FFD700, #FFA500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .btn {
            background: linear-gradient(180deg, #4CAF50, #45a049);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 24px;
            border-radius: 30px;
            cursor: pointer;
            margin: 10px;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.4);
            transition: transform 0.1s;
            pointer-events: auto;
        }
        
        .btn:active {
            transform: scale(0.95);
        }
        
        .btn-secondary {
            background: linear-gradient(180deg, #2196F3, #1976D2);
        }
        
        #skillSelect {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 30px;
            border-radius: 20px;
            display: none;
            z-index: 200;
            text-align: center;
        }
        
        #skillSelect h2 {
            color: #FFD700;
            margin-bottom: 20px;
            font-size: 32px;
        }
        
        .skill-cards {
            display: flex;
            gap: 20px;
            justify-content: center;
        }
        
        .skill-card {
            background: linear-gradient(180deg, #667eea, #764ba2);
            color: white;
            padding: 20px;
            border-radius: 15px;
            width: 180px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .skill-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.6);
        }
        
        .skill-card h3 {
            font-size: 18px;
            margin-bottom: 10px;
        }
        
        .skill-card p {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .skill-rare {
            background: linear-gradient(180deg, #FFD700, #FFA500);
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4);
        }
        
        #message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            color: #FFD700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 150;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        
        <div id="ui">
            <div class="ui-panel">
                <span class="ui-icon">❤️</span>
                <span id="health">100</span>
            </div>
            <div class="ui-panel">
                <span class="ui-icon">🌊</span>
                <span id="wave">1</span>
            </div>
            <div class="ui-panel">
                <span class="ui-icon">💰</span>
                <span id="gold">100</span>
            </div>
        </div>
        
        <div id="startScreen">
            <h1>🏰 肉鸽塔防</h1>
            <p style="font-size: 18px; margin-bottom: 30px; opacity: 0.9;">Roguelike Tower Defense</p>
            <button class="btn" onclick="game.start()">开始游戏</button>
            <p style="margin-top: 20px; font-size: 14px; opacity: 0.7;">放置防御塔 · 随机技能 · 抵御波次</p>
        </div>
        
        <div id="gameOverScreen">
            <h1 id="gameOverTitle">游戏结束</h1>
            <p id="finalScore" style="font-size: 24px; margin-bottom: 30px;">存活波次：10</p>
            <button class="btn" onclick="game.start()">再来一局</button>
        </div>
        
        <div id="skillSelect">
            <h2>✨ 选择技能</h2>
            <div class="skill-cards" id="skillCards"></div>
        </div>
        
        <div id="message"></div>
    </div>

    <script src="game.js"></script>
</body>
</html>
